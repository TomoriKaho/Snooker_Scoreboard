<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <title>斯诺克计分器</title>
  <style>
    :root {
      --left-bg: #b80f1b;
      --right-bg: #0f4db8;
      --white: #ffffff;
      --ink: #111217;
      --soft-white: rgba(255, 255, 255, 0.84);
      --panel-shadow: rgba(0, 0, 0, 0.24);
      --control-bg: rgba(255, 255, 255, 0.14);
      --control-border: rgba(255, 255, 255, 0.34);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", "Noto Sans CJK SC", sans-serif;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #101116;
      color: var(--white);
    }

    body {
      min-height: 100svh;
      user-select: none;
      touch-action: manipulation;
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .scoreboard {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100vw;
      height: 100svh;
      min-width: 640px;
      min-height: 320px;
      isolation: isolate;
    }

    .side {
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: clamp(6px, 1.6vh, 16px);
      padding: max(14px, calc(env(safe-area-inset-top) + 6px))
        clamp(14px, 2.4vw, 36px)
        max(10px, env(safe-area-inset-bottom));
      box-shadow: inset 0 0 80px var(--panel-shadow);
      overflow: hidden;
    }

    .side.left {
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.16), transparent 26%),
        linear-gradient(135deg, #cf1928 0%, var(--left-bg) 52%, #790812 100%);
      padding-right: clamp(26px, 3.8vw, 56px);
    }

    .side.right {
      background:
        radial-gradient(circle at 82% 16%, rgba(255, 255, 255, 0.16), transparent 26%),
        linear-gradient(225deg, #1d6be0 0%, var(--right-bg) 52%, #08275f 100%);
      padding-left: clamp(26px, 3.8vw, 56px);
    }

    .player {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      min-height: clamp(30px, 4.6vh, 42px);
    }

    .side.right .player {
      justify-content: flex-end;
    }

    .player-name {
      min-width: 0;
      max-width: 100%;
      padding: 6px 0;
      border-bottom: 2px solid rgba(255, 255, 255, 0.32);
      color: var(--soft-white);
      font-size: clamp(18px, 2.6vw, 32px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: 0;
      outline: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .player-name:focus {
      border-bottom-color: var(--white);
    }

    .score-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 0;
      gap: clamp(10px, 2vh, 24px);
      text-align: center;
    }

    .score-layout {
      --ball-size: clamp(62px, 7.2vw, 90px);
      --ball-gap: clamp(7px, 0.75vw, 12px);
      position: relative;
      display: grid;
      grid-template-columns: repeat(5, var(--ball-size));
      grid-template-rows: repeat(5, var(--ball-size));
      gap: var(--ball-gap);
      place-items: center;
      width: calc(var(--ball-size) * 5 + var(--ball-gap) * 4);
      height: calc(var(--ball-size) * 5 + var(--ball-gap) * 4);
      max-width: 100%;
    }

    .score {
      position: relative;
      grid-column: 2 / 5;
      grid-row: 3 / 5;
      z-index: 1;
      font-size: clamp(98px, 17.85vw, 224px);
      font-weight: 900;
      line-height: 0.86;
      letter-spacing: 0;
      text-shadow: 0 10px 32px rgba(0, 0, 0, 0.28);
      font-variant-numeric: tabular-nums;
    }

    .balls {
      z-index: 2;
      grid-column: 1 / -1;
      grid-row: 1 / -1;
      display: grid;
      grid-template-columns: repeat(5, var(--ball-size));
      grid-template-rows: repeat(5, var(--ball-size));
      gap: var(--ball-gap);
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .ball {
      display: inline-grid;
      place-items: center;
      position: relative;
      width: var(--ball-size);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.88);
      box-shadow:
        inset -9px -12px 18px rgba(0, 0, 0, 0.3),
        inset 6px 7px 13px rgba(255, 255, 255, 0.26),
        0 10px 20px rgba(0, 0, 0, 0.25);
      color: #fff;
      font-size: clamp(23px, 2.7vw, 36px);
      font-weight: 900;
      line-height: 1;
      pointer-events: auto;
    }

    .ball::before {
      content: "";
      position: absolute;
      top: 17%;
      left: 22%;
      width: 25%;
      height: 17%;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.42);
      filter: blur(1px);
    }

    .ball.red {
      grid-column: 1;
      grid-row: 3;
      background: #d11124;
    }

    .side.right .ball.red {
      grid-column: 5;
      grid-row: 3;
    }

    .ball.yellow {
      grid-column: 2;
      grid-row: 5;
      background: #f1d22b;
      color: #171717;
    }

    .ball.green {
      grid-column: 3;
      grid-row: 5;
      background: #138340;
    }

    .ball.brown {
      grid-column: 4;
      grid-row: 5;
      background: #714323;
    }

    .ball.blue {
      grid-column: 2;
      grid-row: 2;
      background: #145ee5;
    }

    .ball.pink {
      grid-column: 3;
      grid-row: 2;
      background: #ea71a8;
    }

    .ball.black {
      grid-column: 4;
      grid-row: 2;
      background: #141414;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(10px, 1.4vw, 18px);
      width: min(100%, 520px);
      margin: 0 auto;
    }

    .control {
      min-height: clamp(38px, 5.4vh, 54px);
      border: 1px solid var(--control-border);
      border-radius: 8px;
      background: var(--control-bg);
      color: #fff;
      font-size: clamp(17px, 2vw, 24px);
      font-weight: 850;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(8px);
    }

    .reset {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 5;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      width: clamp(70px, 9.5vw, 112px);
      aspect-ratio: 1;
      border: 3px solid rgba(255, 255, 255, 0.96);
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 28%, rgba(255, 255, 255, 0.28), transparent 30%),
        #111217;
      color: #fff;
      font-size: clamp(17px, 2vw, 25px);
      font-weight: 900;
      box-shadow:
        0 18px 34px rgba(0, 0, 0, 0.4),
        0 0 0 8px rgba(255, 255, 255, 0.1);
    }

    .leader {
      position: absolute;
      left: 50%;
      top: max(8px, env(safe-area-inset-top));
      z-index: 5;
      transform: translateX(-50%);
      display: grid;
      place-items: center;
      width: clamp(220px, 36vw, 520px);
      min-height: clamp(48px, 7vh, 76px);
      padding: 8px 18px;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 8px;
      background: rgba(17, 18, 23, 0.88);
      color: #fff;
      font-size: clamp(24px, 3.7vw, 48px);
      font-weight: 900;
      line-height: 1.15;
      text-align: center;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    .leader.left-leading {
      background:
        radial-gradient(circle at 18% 16%, rgba(255, 255, 255, 0.18), transparent 32%),
        linear-gradient(135deg, #d51d2c 0%, var(--left-bg) 58%, #8b0b15 100%);
    }

    .leader.right-leading {
      background:
        radial-gradient(circle at 82% 16%, rgba(255, 255, 255, 0.2), transparent 32%),
        linear-gradient(225deg, #2474eb 0%, var(--right-bg) 58%, #092d6c 100%);
    }

    .leader.tied {
      background: rgba(17, 18, 23, 0.88);
    }

    .divider {
      position: absolute;
      left: 50%;
      top: 0;
      z-index: 2;
      width: 2px;
      height: 100%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.64);
      box-shadow: 0 0 18px rgba(255, 255, 255, 0.42);
      pointer-events: none;
    }

    .confirm-overlay {
      position: absolute;
      inset: 0;
      z-index: 8;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.48);
    }

    .confirm-overlay.is-open {
      display: grid;
    }

    .confirm-dialog {
      width: min(84vw, 340px);
      padding: 22px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 8px;
      background: #111217;
      box-shadow: 0 22px 48px rgba(0, 0, 0, 0.42);
      text-align: center;
    }

    .confirm-title {
      margin: 0 0 18px;
      color: #fff;
      font-size: clamp(18px, 2.1vw, 24px);
      font-weight: 900;
      line-height: 1.3;
    }

    .confirm-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .confirm-button {
      min-height: 46px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
      font-size: 17px;
      font-weight: 850;
    }

    .confirm-button.primary {
      background: #ffffff;
      color: #111217;
    }

    .control:active,
    .reset:active,
    .confirm-button:active {
      transform: translateY(1px) scale(0.98);
    }

    .reset:active {
      transform: translate(-50%, calc(-50% + 1px)) scale(0.98);
    }

    .control:focus-visible,
    .ball:focus-visible,
    .reset:focus-visible,
    .confirm-button:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.78);
      outline-offset: 3px;
    }

    @media (orientation: portrait) {
      html,
      body {
        overflow: hidden;
      }

      .scoreboard {
        position: fixed;
        top: 0;
        left: 0;
        width: 100svh;
        height: 100svw;
        min-width: 620px;
        min-height: 330px;
        transform: rotate(90deg) translateY(-100%);
        transform-origin: top left;
      }

      .score-layout {
        --ball-size: clamp(48px, 14svmin, 64px);
        --ball-gap: 5px;
      }

      .ball {
        font-size: clamp(19px, 5.6svmin, 30px);
      }

    }

    @media (max-height: 390px) {
      .side {
        gap: 8px;
        padding-top: 12px;
        padding-bottom: 10px;
      }

      .player {
        min-height: 34px;
      }

      .score-area {
        gap: 8px;
      }

      .score-layout {
        --ball-size: clamp(48px, 6.2vw, 66px);
        --ball-gap: 6px;
      }

      .score {
        font-size: clamp(88px, 15.4vw, 173px);
      }

      .ball {
        font-size: clamp(18px, 2.15vw, 25px);
      }

      .leader {
        top: 8px;
        width: clamp(220px, 34vw, 360px);
        min-height: 42px;
        font-size: clamp(21px, 3.2vw, 34px);
      }

      .controls {
        width: min(100%, 420px);
      }

      .control {
        min-height: 40px;
        font-size: clamp(15px, 1.8vw, 21px);
      }
    }

    @media (prefers-reduced-motion: no-preference) {
      .score {
        transition: transform 140ms ease;
      }

      .score.bump {
        transform: scale(1.055);
      }

      .control,
      .ball,
      .reset,
      .confirm-button {
        transition:
          transform 120ms ease,
          filter 120ms ease,
          background-color 120ms ease;
      }

      .control:hover,
      .ball:hover,
      .reset:hover,
      .confirm-button:hover {
        filter: brightness(1.08);
      }
    }
  </style>
</head>
<body>
  <main class="scoreboard" aria-label="斯诺克计分器">
    <section class="side left" aria-label="红方计分区">
      <header class="player">
        <div class="player-name" contenteditable="true" spellcheck="false" data-player-name="left">红方</div>
      </header>
      <div class="score-area">
        <div class="score-layout">
          <output class="score" data-score="left" aria-live="polite">0</output>
          <div class="balls" aria-label="红方加分">
            <button class="ball red" type="button" data-side="left" data-points="1" aria-label="红方加1分">+1</button>
            <button class="ball yellow" type="button" data-side="left" data-points="2" aria-label="红方加2分">+2</button>
            <button class="ball green" type="button" data-side="left" data-points="3" aria-label="红方加3分">+3</button>
            <button class="ball brown" type="button" data-side="left" data-points="4" aria-label="红方加4分">+4</button>
            <button class="ball blue" type="button" data-side="left" data-points="5" aria-label="红方加5分">+5</button>
            <button class="ball pink" type="button" data-side="left" data-points="6" aria-label="红方加6分">+6</button>
            <button class="ball black" type="button" data-side="left" data-points="7" aria-label="红方加7分">+7</button>
          </div>
        </div>
      </div>
      <footer class="controls" aria-label="红方操作">
        <button class="control" type="button" data-action="undo" data-side="left">撤销</button>
        <button class="control" type="button" data-action="redo" data-side="left">重做</button>
        <button class="control" type="button" data-action="minus" data-side="left">减 1</button>
      </footer>
    </section>

    <div class="divider" aria-hidden="true"></div>
    <div class="leader" data-leader aria-live="polite">双方平分</div>
    <button class="reset" type="button" data-action="reset" aria-label="重置比分">重置</button>

    <div class="confirm-overlay" data-reset-confirm hidden>
      <div class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="reset-confirm-title">
        <p class="confirm-title" id="reset-confirm-title">确定要重置比分吗？</p>
        <div class="confirm-actions">
          <button class="confirm-button" type="button" data-action="reset-cancel">取消</button>
          <button class="confirm-button primary" type="button" data-action="reset-confirm">确定</button>
        </div>
      </div>
    </div>

    <section class="side right" aria-label="蓝方计分区">
      <header class="player">
        <div class="player-name" contenteditable="true" spellcheck="false" data-player-name="right">蓝方</div>
      </header>
      <div class="score-area">
        <div class="score-layout">
          <output class="score" data-score="right" aria-live="polite">0</output>
          <div class="balls" aria-label="蓝方加分">
            <button class="ball red" type="button" data-side="right" data-points="1" aria-label="蓝方加1分">+1</button>
            <button class="ball yellow" type="button" data-side="right" data-points="2" aria-label="蓝方加2分">+2</button>
            <button class="ball green" type="button" data-side="right" data-points="3" aria-label="蓝方加3分">+3</button>
            <button class="ball brown" type="button" data-side="right" data-points="4" aria-label="蓝方加4分">+4</button>
            <button class="ball blue" type="button" data-side="right" data-points="5" aria-label="蓝方加5分">+5</button>
            <button class="ball pink" type="button" data-side="right" data-points="6" aria-label="蓝方加6分">+6</button>
            <button class="ball black" type="button" data-side="right" data-points="7" aria-label="蓝方加7分">+7</button>
          </div>
        </div>
      </div>
      <footer class="controls" aria-label="蓝方操作">
        <button class="control" type="button" data-action="undo" data-side="right">撤销</button>
        <button class="control" type="button" data-action="redo" data-side="right">重做</button>
        <button class="control" type="button" data-action="minus" data-side="right">减 1</button>
      </footer>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "snooker-scoreboard-state-v1";
    const defaultState = {
      left: { name: "红方", score: 0, history: [], future: [] },
      right: { name: "蓝方", score: 0, history: [], future: [] }
    };

    let state = loadState();
    const resetConfirm = document.querySelector("[data-reset-confirm]");
    const resetConfirmButton = document.querySelector('[data-action="reset-confirm"]');
    const leader = document.querySelector("[data-leader]");

    function loadState() {
      try {
        const stored = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return {
          left: normalizeSide(stored && stored.left, defaultState.left),
          right: normalizeSide(stored && stored.right, defaultState.right)
        };
      } catch {
        return structuredClone(defaultState);
      }
    }

    function normalizeSide(side, fallback) {
      return {
        name: normalizeName(side?.name, fallback.name),
        score: Number.isFinite(side?.score) ? Math.max(0, Math.round(side.score)) : fallback.score,
        history: Array.isArray(side?.history) ? side.history.filter(Number.isFinite).slice(-100) : [],
        future: Array.isArray(side?.future) ? side.future.filter(Number.isFinite).slice(-100) : []
      };
    }

    function normalizeName(name, fallback) {
      if (typeof name !== "string" || !name.trim()) return fallback;
      const trimmed = name.trim();
      if (trimmed === "左方" || trimmed === "右方") return fallback;
      return trimmed;
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function render(side) {
      const score = document.querySelector(`[data-score="${side}"]`);
      const name = document.querySelector(`[data-player-name="${side}"]`);
      score.value = state[side].score;
      score.textContent = state[side].score;
      if (document.activeElement !== name) {
        name.textContent = state[side].name;
      }
      bump(score);
      renderLeader();
    }

    function renderAll() {
      render("left");
      render("right");
      renderLeader();
    }

    function renderLeader() {
      const diff = state.left.score - state.right.score;
      leader.classList.toggle("left-leading", diff > 0);
      leader.classList.toggle("right-leading", diff < 0);
      leader.classList.toggle("tied", diff === 0);
      if (diff === 0) {
        leader.textContent = "双方平分";
        return;
      }

      const side = diff > 0 ? "left" : "right";
      leader.textContent = `${state[side].name}领先 ${Math.abs(diff)} 分`;
    }

    function bump(element) {
      element.classList.remove("bump");
      window.requestAnimationFrame(() => {
        element.classList.add("bump");
        window.setTimeout(() => element.classList.remove("bump"), 160);
      });
    }

    function changeScore(side, delta) {
      const current = state[side].score;
      const next = Math.max(0, current + delta);
      if (next === current && delta < 0) return;
      state[side].history.push(current);
      state[side].history = state[side].history.slice(-100);
      state[side].future = [];
      state[side].score = next;
      saveState();
      render(side);
    }

    function undo(side) {
      const previous = state[side].history.pop();
      if (!Number.isFinite(previous)) return;
      state[side].future.push(state[side].score);
      state[side].future = state[side].future.slice(-100);
      state[side].score = previous;
      saveState();
      render(side);
    }

    function redo(side) {
      const next = state[side].future.pop();
      if (!Number.isFinite(next)) return;
      state[side].history.push(state[side].score);
      state[side].history = state[side].history.slice(-100);
      state[side].score = next;
      saveState();
      render(side);
    }

    function showResetConfirm() {
      resetConfirm.hidden = false;
      resetConfirm.classList.add("is-open");
      resetConfirmButton.focus({ preventScroll: true });
    }

    function hideResetConfirm() {
      resetConfirm.classList.remove("is-open");
      resetConfirm.hidden = true;
    }

    function resetScores() {
      state.left.history.push(state.left.score);
      state.right.history.push(state.right.score);
      state.left.history = state.left.history.slice(-100);
      state.right.history = state.right.history.slice(-100);
      state.left.future = [];
      state.right.future = [];
      state.left.score = 0;
      state.right.score = 0;
      saveState();
      hideResetConfirm();
      renderAll();
    }

    document.addEventListener("click", event => {
      const button = event.target.closest("button");
      if (!button) return;

      const side = button.dataset.side;
      const points = Number(button.dataset.points);
      const action = button.dataset.action;

      if (side && Number.isFinite(points)) {
        changeScore(side, points);
        return;
      }

      if (action === "minus" && side) {
        changeScore(side, -1);
        return;
      }

      if (action === "undo" && side) {
        undo(side);
        return;
      }

      if (action === "redo" && side) {
        redo(side);
        return;
      }

      if (action === "reset") {
        showResetConfirm();
        return;
      }

      if (action === "reset-cancel") {
        hideResetConfirm();
        return;
      }

      if (action === "reset-confirm") {
        resetScores();
      }
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && !resetConfirm.hidden) {
        hideResetConfirm();
      }
    });

    document.querySelectorAll("[data-player-name]").forEach(nameNode => {
      nameNode.addEventListener("input", () => {
        const side = nameNode.dataset.playerName;
        state[side].name = nameNode.textContent.trim() || defaultState[side].name;
        saveState();
      });

      nameNode.addEventListener("keydown", event => {
        if (event.key === "Enter") {
          event.preventDefault();
          nameNode.blur();
        }
      });
    });

    renderAll();
  </script>
</body>
</html>
